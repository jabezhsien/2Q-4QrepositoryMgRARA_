<!DOCTYPE html>
    <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <meta name="author" content="Jabez Hsien G. Rara">
            <meta name="description" content="2Q Portfolio" /> 
            <meta name="keywords" content="2Q, Portfolio, Projects, Web Development" /> 
            <title>Q4_1G</title>
            <script src="q41gMg24.js"></script>
            <style>
                body {
                    padding: 20px;
                    background-color: #530e64;
                }

                legend {
                    text-align: center;
                    font-size: 24px;
                    font-weight: bold;
                    margin-bottom: 20px;
                    color: #3aa5fc;
                }

                #movieDetails {
                    font-family: arial;
                    width: 60%;
                    margin: auto;
                    box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.4);
                    border-radius: 5px;
                    padding: 20px 30px;
                    border: 10px solid #67fc3a;
                }
                
                .movieTitle {
                    font-size: 18px;
                    font-weight: bold;
                    color: #333;
                    margin-top: 20px;
                }

                input[type="text"],
                input[type="number"],
                select {
                    font-size: 14px;
                    width: 80%;
                    border: 2px solid #ccc;
                    padding: 8px;
                    margin-bottom: 15px;
                    border-radius: 7px;
                    transition: border-color 0.2s ease;
                }

                .starContainer {
                    display: inline-block;
                }

                label {
                    display: inline-block;
                    width: 100px;
                }

                .starContainer {
                    margin-bottom: 10px;
                    display: flex;
                    gap: 6px;
                }

                .star {
                    font-size: 30px;
                    color: lightgray;
                    transition: color 0.2s;
                    cursor: pointer;
                }

                .star:hover,
                .star.selected {
                    color: rgb(237, 210, 55);
                }

                button {
                    background-color: #4CAF50;
                    color: white;
                    padding: 10px 20px;
                    border: none;
                    border-radius: 4px;
                    cursor: pointer;
                    display: block;
                    width: 90%;
                    min-width: 160px;
                    margin: 5px auto 0;
                    transition: background-color 0.2s ease, transform 0.12s ease, box-shadow 0.12s ease;
                }

                button:hover {
                    background-color: #449d48;
                    transform: translateY(-2px) scale(1.02);
                    box-shadow: 0 4px 10px rgba(0,0,0,0.12);
                }

                button:active {
                    transform: translateY(0) scale(0.995);
                    box-shadow: none;
                }

                h2 {
                    text-align: center;
                    color: #3aa5fc;
                    margin-top: 30px;
                }
        </style>
        </head>
        <body>
           <form id="movieDetails" method="post">
                <legend>Add a Movie</legend><br>
                <fieldset form="movieDetails">
                    <label for="movieTitle">Movie Title: </label>
                        <input type="text" id="movieTitle" name="movieTitle" required><br><br>
                    <label for="director">Year: </label>
                        <input type="number" id="director" name="director" required><br><br>
                    <label for="genre">Genre: </label>
                        <select name="genre" id="genre">'
                            <option value="" disabled selected hidden>Select a genre!</option>
                            <option value="action">Action</option>
                            <option value="adventure">Adventure</option>
                            <option value="comedy">Comedy</option>
                            <option value="drama">Drama</option>
                            <option value="fantasy">Fantasy</option>
                            <option value="musical">Musical</option>
                            <option value="horror">Horror</option>
                            <option value="sci-fi">Sci-Fi</option>
                            <option value="romance">Romance</option>
                            <option value="war">War</option>

                        </select>
                        <br><br>
                    <label for="starRating">Rating: </label>
                        <div class="starContainer" id="starRating">
                            <span class="star" data-value="1">&#9733;</span>
                            <span class="star" data-value="2">&#9733;</span>
                            <span class="star" data-value="3">&#9733;</span>
                            <span class="star" data-value="4">&#9733;</span>
                            <span class="star" data-value="5">&#9733;</span>    
                        </div><br>
                    
                    <button type="button" onclick="submitMovie()">Add Movie</button>
                    
                    <h2 id="movieList">Movie List</h2>
                        <ul id="listOfMovies"></ul>

                </fieldset>
            </form>
        </body>
    </html>
